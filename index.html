<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><!-- KETIK JUDUL HALAMAN DI SINI --></title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1><!-- KETIK NAMA TOKO KAMU DI SINI (CONTOH: Toko Baju Budi) --></h1>
        
        <div class="cart-icon" id="cart-icon">
            <!-- KETIK TEKS UNTUK KERANJANG DI SINI (CONTOH: 🛒 Keranjang) --> (<span id="cart-count">0</span>)
        </div>
    </header>

    <main>
        <!-- DAFTAR PRODUK AKAN OTOMATIS MUNCUL DI SINI DARI JAVASCRIPT -->
        <section class="product-list" id="product-list">
        </section>

        <section class="cart-sidebar" id="cart-sidebar">
            <h2><!-- KETIK JUDUL UNTUK SIDEBAR KERANJANG DI SINI (CONTOH: Keranjang Belanja) --></h2>
            <div id="cart-items">
                <p><!-- KETIK TEKS JIKA KERANJANG KOSONG DI SINI (CONTOH: Keranjang masih kosong.) --></p>
            </div>
            <div class="cart-total">
                <strong><!-- KETIK TEKS UNTUK TOTAL HARGA (CONTOH: Total: Rp) --> <span id="total-price">0</span></strong>
            </div>
            <button id="checkout-btn" class="checkout-btn"><!-- KETIK TEKS UNTUK TOMBOL BAYAR (CONTOH: Bayar Sekarang) --></button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
